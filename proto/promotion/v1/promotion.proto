syntax = "proto3";
package promotion.v1;
option go_package = "github.com/wemall/gen/promotion/v1;promotionv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum DiscountType {
  DISCOUNT_TYPE_UNSPECIFIED = 0;
  DISCOUNT_TYPE_PERCENTAGE = 1;
  DISCOUNT_TYPE_FIXED_AMOUNT = 2;
}

enum FlashSaleStatus {
  FLASH_SALE_STATUS_UNSPECIFIED = 0;
  FLASH_SALE_STATUS_SCHEDULED = 1;
  FLASH_SALE_STATUS_ACTIVE = 2;
  FLASH_SALE_STATUS_ENDED = 3;
}

message Coupon {
  string id = 1;
  string code = 2;
  string seller_id = 3; // empty for platform-wide
  DiscountType discount_type = 4;
  double discount_value = 5;
  double min_order_value = 6;
  double max_discount = 7;
  google.protobuf.Timestamp start_date = 8;
  google.protobuf.Timestamp end_date = 9;
  int32 usage_limit = 10;
  int32 usage_count = 11;
}

message FlashSaleItem {
  string id = 1;
  string product_id = 2;
  double discount_price = 3;
  int32 stock_limit = 4;
}

message FlashSale {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  FlashSaleStatus status = 5;
  repeated FlashSaleItem items = 6;
}

message ValidateCouponRequest {
  string code = 1;
  double cart_total = 2;
  string seller_id = 3;
  string buyer_id = 4;
}

message ValidateCouponResponse {
  bool is_valid = 1;
  double discount_amount = 2;
  string error_message = 3;
}

message ApplyCouponRequest {
  string code = 1;
  string order_id = 2;
  string buyer_id = 3;
}

message ApplyCouponResponse {
  bool success = 1;
}

message CreateCouponRequest {
  string code = 1;
  string seller_id = 2;
  DiscountType discount_type = 3;
  double discount_value = 4;
  double min_order_value = 5;
  double max_discount = 6;
  google.protobuf.Timestamp start_date = 7;
  google.protobuf.Timestamp end_date = 8;
  int32 usage_limit = 9;
}

message ListActiveFlashSalesResponse {
  repeated FlashSale sales = 1;
}

service PromotionService {
  rpc ValidateCoupon(ValidateCouponRequest) returns (ValidateCouponResponse);
  rpc ApplyCoupon(ApplyCouponRequest) returns (ApplyCouponResponse);
  rpc CreateCoupon(CreateCouponRequest) returns (Coupon);
  rpc ListActiveFlashSales(google.protobuf.Empty) returns (ListActiveFlashSalesResponse);
}
