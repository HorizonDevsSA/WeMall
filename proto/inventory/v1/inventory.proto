syntax = "proto3";
package inventory.v1;
option go_package = "github.com/wemall/gen/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";

message StockItem {
  string                    variant_id = 1;
  int32                     quantity   = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message UpsertStockRequest {
  string variant_id = 1;
  int32  quantity   = 2;
}

message GetStockRequest {
  string variant_id = 1;
}

message GetStockBatchRequest {
  repeated string variant_ids = 1;
}

message GetStockBatchResponse {
  map<string, StockItem> stocks = 1;
}

service InventoryService {
  rpc UpsertStock(UpsertStockRequest)       returns (StockItem);
  rpc GetStock(GetStockRequest)             returns (StockItem);
  rpc GetStockBatch(GetStockBatchRequest)   returns (GetStockBatchResponse);
}
