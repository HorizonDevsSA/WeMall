syntax = "proto3";
package product.v1;
option go_package = "github.com/wemall/gen/product/v1;productv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_DRAFT       = 1;
  PRODUCT_STATUS_ACTIVE      = 2;
  PRODUCT_STATUS_PAUSED      = 3;
  PRODUCT_STATUS_BANNED      = 4;
}

enum ProductType {
  PRODUCT_TYPE_UNSPECIFIED = 0;
  PRODUCT_TYPE_ELECTRONICS = 1;
  PRODUCT_TYPE_MOBILE_PHONES_ACCESSORIES = 2;
  PRODUCT_TYPE_FASHION = 3;
  PRODUCT_TYPE_HOME_FURNITURE = 4;
  PRODUCT_TYPE_BEAUTY_HEALTH = 5;
  PRODUCT_TYPE_APPLIANCES = 6;
  PRODUCT_TYPE_AUTOMOTIVE = 7;
  PRODUCT_TYPE_HARDWARE_CONSTRUCTION = 8;
  PRODUCT_TYPE_AGRICULTURE = 9;
  PRODUCT_TYPE_SPORTS_OUTDOORS = 10;
  PRODUCT_TYPE_BABY_KIDS = 11;
  PRODUCT_TYPE_OFFICE_SUPPLIES = 12;
  PRODUCT_TYPE_BOOKS_EDUCATION = 13;
  PRODUCT_TYPE_PET_SUPPLIES = 14;
  PRODUCT_TYPE_DIGITAL_PRODUCTS = 15;
  PRODUCT_TYPE_SERVICES = 16;
  PRODUCT_TYPE_LIQUIDS = 17;
  PRODUCT_TYPE_BEVERAGES = 18;
}

// ── Core Types ────────────────────────────────────────────────────────────────

message Category {
  string                   id               = 1;
  string                   parent_id        = 2;
  string                   name             = 3;  // translated
  string                   slug             = 4;
  string                   icon_url         = 5;
  string                   banner_url       = 6;
  int32                    level            = 7;
  google.protobuf.Struct   attribute_schema = 8;
  int32                    sort_order       = 9;
  repeated Category        children         = 10;
}

message ProductVariant {
  string                 id            = 1;
  string                 product_id    = 2;
  string                 sku           = 3;
  google.protobuf.Struct options       = 4;  // {"color":"Red","size":"XL"}
  double                 price         = 5;  // USD
  double                 compare_price = 6;
  string                 image_url     = 7;
  bool                   is_default    = 8;
}

message ProductImage {
  string id         = 1;
  string product_id = 2;
  string url        = 3;
  string alt_text   = 4;
  int32  sort_order = 5;
  bool   is_primary = 6;
}

message Product {
  string                    id             = 1;
  string                    seller_id      = 2;
  string                    category_id    = 3;
  string                    title          = 4;  // translated
  string                    slug           = 5;
  string                    description    = 6;  // translated
  google.protobuf.Struct    attributes     = 7;  // category-specific JSONB
  string                    brand          = 8;
  string                    origin_country = 9;
  ProductStatus             status         = 10;
  double                    rating         = 11;
  int32                     review_count   = 12;
  int32                     sold_count     = 13;
  double                    min_price      = 14;
  double                    max_price      = 15;
  repeated ProductVariant   variants       = 16;
  repeated ProductImage     images         = 17;
  repeated string           tags           = 18;
  google.protobuf.Timestamp created_at     = 19;
  google.protobuf.Timestamp updated_at     = 20;
  double                    latitude       = 21;
  double                    longitude      = 22;
  double                    distance       = 23;
  ProductType               product_type   = 24;
  string                    thumbnail      = 25;
  string                    image_url      = 26;
}

// ── Filter & Pagination ───────────────────────────────────────────────────────

message ProductFilter {
  string                 search       = 1;
  string                 category_id  = 2;
  string                 seller_id    = 3;
  double                 min_price    = 4;
  double                 max_price    = 5;
  google.protobuf.Struct attributes   = 6;  // JSONB @> filter
  repeated string        tags         = 7;
  double                 min_rating   = 8;
  bool                   in_stock_only= 9;
}

// ── Request / Response Messages ───────────────────────────────────────────────

message ListCategoriesRequest {
  string language = 1;  // "en" | "sn" | "nd"
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message GetCategoryRequest {
  string slug     = 1;
  string language = 2;
}

message ListProductsRequest {
  ProductFilter filter     = 1;
  int32         page_size  = 2;
  string        page_token = 3;
  string        language   = 4;
}

message ListProductsResponse {
  repeated Product products        = 1;
  string           next_page_token = 2;
  int32            total           = 3;
}

message GetProductRequest {
  string id       = 1;
  string slug     = 2;
  string language = 3;
}

message GetProductBatchRequest {
  repeated string ids      = 1;
  string          language = 2;
}

message GetProductBatchResponse {
  map<string, Product> products = 1;
}

message GetVariantBatchRequest {
  repeated string ids = 1;
}

message GetVariantBatchResponse {
  map<string, ProductVariant> variants = 1;
}

message CreateVariantInput {
  string                 sku              = 1;
  google.protobuf.Struct options          = 2;
  double                 price            = 3;
  double                 compare_price    = 4;
  int32                  initial_quantity = 5;
  string                 image_url        = 6;
}

message CreateProductRequest {
  string                    seller_id      = 1;
  string                    category_id    = 2;
  string                    title          = 3;
  string                    description    = 4;
  google.protobuf.Struct    attributes     = 5;
  string                    brand          = 6;
  string                    origin_country = 7;
  repeated CreateVariantInput variants     = 8;
  repeated string           tags           = 9;
  string                    language       = 10;
  double                    latitude       = 11;
  double                    longitude      = 12;
  ProductType               product_type   = 13;
  string                    image_url      = 14;
  string                    thumbnail_url  = 15;
  repeated string           images         = 16;
}

message UpdateProductRequest {
  string                 id            = 1;
  string                 seller_id     = 2;
  string                 title         = 3;
  string                 description   = 4;
  google.protobuf.Struct attributes    = 5;
  string                 brand         = 6;
  string                 language      = 7;
  ProductStatus          status        = 8;
  string                 image_url     = 9;
  string                 thumbnail_url = 10;
  repeated string        images        = 11;
}

message DeleteProductRequest {
  string id        = 1;
  string seller_id = 2;
}

message ListNearbyProductsRequest {
  double latitude      = 1;
  double longitude     = 2;
  double radius_meters = 3;
  int32  page_size     = 4;
  string page_token    = 5;
  string language      = 6;
}

message ListNearbyProductsResponse {
  repeated Product products        = 1;
  string           next_page_token = 2;
  int32            total           = 3;
}

message ListRecommendedProductsRequest {
  int32  page_size  = 1;
  string page_token = 2;
  string language   = 3;
}

message ListRecommendedProductsResponse {
  repeated Product products        = 1;
  string           next_page_token = 2;
  int32            total           = 3;
}

// ── Service ───────────────────────────────────────────────────────────────────

service ProductService {
  rpc ListCategories(ListCategoriesRequest)       returns (ListCategoriesResponse);
  rpc GetCategory(GetCategoryRequest)             returns (Category);
  rpc ListProducts(ListProductsRequest)           returns (ListProductsResponse);
  rpc GetProduct(GetProductRequest)               returns (Product);
  rpc GetProductBatch(GetProductBatchRequest)     returns (GetProductBatchResponse);
  rpc GetVariantBatch(GetVariantBatchRequest)     returns (GetVariantBatchResponse);
  rpc CreateProduct(CreateProductRequest)         returns (Product);
  rpc UpdateProduct(UpdateProductRequest)         returns (Product);
  rpc DeleteProduct(DeleteProductRequest)         returns (google.protobuf.Empty);
  rpc ListNearbyProducts(ListNearbyProductsRequest) returns (ListNearbyProductsResponse);
  rpc ListRecommendedProducts(ListRecommendedProductsRequest) returns (ListRecommendedProductsResponse);
}
