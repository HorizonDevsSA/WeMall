syntax = "proto3";
package seller.v1;
option go_package = "github.com/wemall/gen/seller/v1;sellerv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum SellerStatus {
  SELLER_STATUS_UNSPECIFIED = 0;
  SELLER_STATUS_PENDING     = 1;
  SELLER_STATUS_PROCESSING  = 2;
  SELLER_STATUS_VERIFIED    = 3;
  SELLER_STATUS_SUSPENDED   = 4;
}

enum PayoutStatus {
  PAYOUT_STATUS_UNSPECIFIED = 0;
  PAYOUT_STATUS_PENDING     = 1;
  PAYOUT_STATUS_PROCESSING  = 2;
  PAYOUT_STATUS_PAID        = 3;
  PAYOUT_STATUS_FAILED      = 4;
}

// ── Core Types ────────────────────────────────────────────────────────────────

message Seller {
  string                    id          = 1;
  string                    user_id     = 2;
  string                    store_name  = 3;
  string                    store_slug  = 4;
  string                    logo_url    = 5;
  string                    banner_url  = 6;
  string                    description = 7;
  double                    rating      = 8;
  int32                     total_sales = 9;
  bool                      is_verified = 10;
  double                    latitude     = 11;
  double                    longitude    = 12;
  google.protobuf.Timestamp created_at  = 13;
  google.protobuf.Timestamp updated_at  = 14;
  SellerStatus              status      = 15;
}

message Payout {
  string                    id           = 1;
  string                    seller_id    = 2;
  double                    amount       = 3;
  string                    currency     = 4;
  PayoutStatus              status       = 5;
  string                    provider_ref = 6;
  google.protobuf.Timestamp paid_at      = 7;
  google.protobuf.Timestamp created_at   = 8;
}

// ── Seller Requests ───────────────────────────────────────────────────────────

message GetSellerRequest {
  string id = 1;
}

message GetSellerByUserIDRequest {
  string user_id = 1;
}

message GetSellerBatchRequest {
  repeated string ids = 1;
}

message GetSellerBatchResponse {
  map<string, Seller> sellers = 1;
}

message CreateStoreRequest {
  string user_id     = 1;
  string store_name  = 2;
  string description = 3;
  string logo_url    = 4;
  string banner_url  = 5;
  double latitude    = 6;
  double longitude   = 7;
}

message UpdateStoreRequest {
  string user_id     = 1;
  string store_name  = 2;
  string description = 3;
  string logo_url    = 4;
  string banner_url  = 5;
  double latitude    = 6;
  double longitude   = 7;
}

message VerifySellerRequest {
  string seller_id = 1;
  bool   verified  = 2;
}

message UpdateSellerStatusRequest {
  string seller_id = 1;
  SellerStatus status = 2;
}

// ── Follow Requests ───────────────────────────────────────────────────────────

message FollowStoreRequest {
  string user_id   = 1;
  string seller_id = 2;
}

message UnfollowStoreRequest {
  string user_id   = 1;
  string seller_id = 2;
}

message IsFollowingStoreRequest {
  string user_id   = 1;
  string seller_id = 2;
}

message IsFollowingStoreResponse {
  bool is_following = 1;
}

message ListFollowedStoresRequest {
  string user_id    = 1;
  int32  page_size  = 2;
  string page_token = 3;
}

message ListFollowedStoresResponse {
  repeated Seller sellers         = 1;
  string          next_page_token = 2;
  int32           total           = 3;
}

message ListStoreFollowersRequest {
  string seller_id = 1;
}

message ListStoreFollowersResponse {
  repeated string user_ids = 1;
}

// ── Payout Requests ───────────────────────────────────────────────────────────

message ListPayoutsRequest {
  string seller_id  = 1;
  int32  page_size  = 2;
  string page_token = 3;
}

message ListPayoutsResponse {
  repeated Payout payouts         = 1;
  string          next_page_token = 2;
  int32           total           = 3;
}

message GetPayoutRequest {
  string id        = 1;
  string seller_id = 2;
}

message CreatePayoutRequest {
  string seller_id = 1;
  double amount    = 2;
  string currency  = 3;
}

// ── Service ───────────────────────────────────────────────────────────────────

service SellerService {
  rpc GetSeller(GetSellerRequest) returns (Seller);
  rpc GetSellerByUserID(GetSellerByUserIDRequest) returns (Seller);
  rpc GetSellerBatch(GetSellerBatchRequest) returns (GetSellerBatchResponse);

  rpc CreateStore(CreateStoreRequest) returns (Seller);
  rpc UpdateStore(UpdateStoreRequest) returns (Seller);
  rpc VerifySeller(VerifySellerRequest) returns (Seller);
  rpc UpdateSellerStatus(UpdateSellerStatusRequest) returns (Seller);

  // Store follows
  rpc FollowStore(FollowStoreRequest) returns (google.protobuf.Empty);
  rpc UnfollowStore(UnfollowStoreRequest) returns (google.protobuf.Empty);
  rpc IsFollowingStore(IsFollowingStoreRequest) returns (IsFollowingStoreResponse);
  rpc ListFollowedStores(ListFollowedStoresRequest) returns (ListFollowedStoresResponse);
  rpc ListStoreFollowers(ListStoreFollowersRequest) returns (ListStoreFollowersResponse);

  rpc ListPayouts(ListPayoutsRequest) returns (ListPayoutsResponse);
  rpc GetPayout(GetPayoutRequest) returns (Payout);
  rpc CreatePayout(CreatePayoutRequest) returns (Payout);
}
