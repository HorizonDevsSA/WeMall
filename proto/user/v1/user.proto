syntax = "proto3";
package user.v1;
option go_package = "github.com/wemall/gen/user/v1;userv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_BUYER       = 1;
  USER_ROLE_SELLER      = 2;
  USER_ROLE_ADMIN       = 3;
}

enum AuthProvider {
  AUTH_PROVIDER_UNSPECIFIED = 0;
  AUTH_PROVIDER_EMAIL       = 1;
  AUTH_PROVIDER_GOOGLE      = 2;
  AUTH_PROVIDER_PHONE       = 3;
}

// ── Core Types ────────────────────────────────────────────────────────────────

message User {
  string                    id            = 1;
  string                    email         = 2;
  string                    phone         = 3;
  string                    full_name     = 4;
  string                    avatar_url    = 5;
  UserRole                  role          = 6;
  bool                      is_verified   = 7;
  AuthProvider              auth_provider = 8;
  google.protobuf.Timestamp created_at    = 9;
  google.protobuf.Timestamp updated_at    = 10;
}

message Address {
  string id            = 1;
  string user_id       = 2;
  string label         = 3;
  string full_name     = 4;
  string phone         = 5;
  string address_line1 = 6;
  string address_line2 = 7;
  string city          = 8;
  string state         = 9;
  string postal_code   = 10;
  string country       = 11;
  bool   is_default    = 12;
}

message AuthResponse {
  string access_token  = 1;
  string refresh_token = 2;
  User   user          = 3;
}

// ── Request / Response Messages ───────────────────────────────────────────────

message GoogleAuthRequest {
  string code         = 1;
  string redirect_uri = 2;
}

message PhoneOTPRequest {
  string phone = 1;
}

message PhoneOTPResponse {
  string message    = 1;
  string request_id = 2;
}

message VerifyOTPRequest {
  string phone = 1;
  string otp   = 2;
}

message SellerRegisterRequest {
  string email     = 1;
  string password  = 2;
  string full_name = 3;
}

message SellerLoginRequest {
  string email    = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message GetUserRequest {
  string id = 1;
}

message GetUserBatchRequest {
  repeated string ids = 1;
}

message GetUserBatchResponse {
  map<string, User> users = 1;
}

message UpdateProfileRequest {
  string user_id    = 1;
  string full_name  = 2;
  string avatar_url = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string   user_id = 1;
  UserRole role    = 2;
  bool     valid   = 3;
}

message ListAddressesRequest {
  string user_id = 1;
}

message ListAddressesResponse {
  repeated Address addresses = 1;
}

message CreateAddressRequest {
  string user_id       = 1;
  string label         = 2;
  string full_name     = 3;
  string phone         = 4;
  string address_line1 = 5;
  string address_line2 = 6;
  string city          = 7;
  string state         = 8;
  string postal_code   = 9;
  string country       = 10;
  bool   is_default    = 11;
}

message DeleteAddressRequest {
  string user_id    = 1;
  string address_id = 2;
}

message SendReviewStatusEmailRequest {
  string email = 1;
  string full_name = 2;
  string store_name = 3;
  string status = 4;
}

// ── Service ───────────────────────────────────────────────────────────────────

service UserService {
  // Buyer auth
  rpc BuyerGoogleAuth(GoogleAuthRequest)   returns (AuthResponse);
  rpc BuyerSendOTP(PhoneOTPRequest)        returns (PhoneOTPResponse);
  rpc BuyerVerifyOTP(VerifyOTPRequest)     returns (AuthResponse);

  // Seller auth
  rpc SellerRegister(SellerRegisterRequest) returns (AuthResponse);
  rpc SellerLogin(SellerLoginRequest)       returns (AuthResponse);

  // Shared auth
  rpc RefreshToken(RefreshTokenRequest)     returns (AuthResponse);
  rpc ValidateToken(ValidateTokenRequest)   returns (ValidateTokenResponse);

  // Profile
  rpc GetUser(GetUserRequest)               returns (User);
  rpc GetUserBatch(GetUserBatchRequest)     returns (GetUserBatchResponse);
  rpc UpdateProfile(UpdateProfileRequest)   returns (User);

  // Addresses
  rpc ListAddresses(ListAddressesRequest)   returns (ListAddressesResponse);
  rpc CreateAddress(CreateAddressRequest)   returns (Address);
  rpc DeleteAddress(DeleteAddressRequest)   returns (google.protobuf.Empty);

  // Notifications
  rpc SendReviewStatusEmail(SendReviewStatusEmailRequest) returns (google.protobuf.Empty);
}

