syntax = "proto3";
package notification.v1;
option go_package = "github.com/wemall/gen/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

enum NotificationCategory {
  NOTIFICATION_CATEGORY_UNSPECIFIED = 0;
  NOTIFICATION_CATEGORY_TRANSACTIONAL = 1;
  NOTIFICATION_CATEGORY_SECURITY = 2;
  NOTIFICATION_CATEGORY_LOW_STOCK = 3;
  NOTIFICATION_CATEGORY_FOLLOWS = 4;
  NOTIFICATION_CATEGORY_MARKETING = 5;
}

message NotificationPreference {
  NotificationCategory category = 1;
  bool email_enabled = 2;
  bool push_enabled = 3;
}

message NotificationLog {
  string id = 1;
  string category = 2;
  string channel = 3;
  string title = 4;
  string content = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
}

message RegisterDeviceTokenRequest {
  string user_id = 1;
  string token = 2;
  string platform = 3;
  string device_name = 4;
}

message DeregisterDeviceTokenRequest {
  string user_id = 1;
  string token = 2;
}

message GetNotificationPreferencesRequest {
  string user_id = 1;
}

message GetNotificationPreferencesResponse {
  repeated NotificationPreference preferences = 1;
}

message UpdateNotificationPreferencesRequest {
  string user_id = 1;
  NotificationCategory category = 2;
  bool email_enabled = 3;
  bool push_enabled = 4;
}

message ListNotificationsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListNotificationsResponse {
  repeated NotificationLog notifications = 1;
}

service NotificationService {
  rpc RegisterDeviceToken(RegisterDeviceTokenRequest) returns (google.protobuf.Empty);
  rpc DeregisterDeviceToken(DeregisterDeviceTokenRequest) returns (google.protobuf.Empty);
  rpc GetNotificationPreferences(GetNotificationPreferencesRequest) returns (GetNotificationPreferencesResponse);
  rpc UpdateNotificationPreferences(UpdateNotificationPreferencesRequest) returns (NotificationPreference);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
}
