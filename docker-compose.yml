services:
  # ── Databases ─────────────────────────────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_users
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5432:5432']
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_users']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-products:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: wemall_products
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5433:5432']
    volumes:
      - pgdata-products:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_products']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_orders
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5434:5432']
    volumes:
      - pgdata-orders:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_orders']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-sellers:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_sellers
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5435:5432']
    volumes:
      - pgdata-sellers:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_sellers']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_notifications
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5436:5432']
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_notifications']
      interval: 5s
      timeout: 5s
      retries: 5


  postgres-reviews:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_reviews
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5438:5432']
    volumes:
      - pgdata-reviews:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_reviews']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payments:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_payments
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5439:5432']
    volumes:
      - pgdata-payments:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_payments']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-chat:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_chat
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5440:5432']
    volumes:
      - pgdata-chat:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_chat']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-dispute:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_dispute
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5441:5432']
    volumes:
      - pgdata-dispute:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_dispute']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-admin:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_admin
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5442:5432']
    volumes:
      - pgdata-admin:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_admin']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-promotion:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_promotion
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5443:5432']
    volumes:
      - pgdata-promotion:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_promotion']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-recommendation:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wemall_recommendation
      POSTGRES_USER: wemall
      POSTGRES_PASSWORD: wemall_secret
    ports: ['5444:5432']
    volumes:
      - pgdata-recommendation:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wemall -d wemall_recommendation']
      interval: 5s
      timeout: 5s
      retries: 5


  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NATS JetStream ─────────────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    ports:
      - '4222:4222'
      - '8222:8222'
    command: ['-js', '-m', '8222']
    volumes:
      - natsdata:/data

  # ── Meilisearch ────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports: ['7700:7700']
    environment:
      MEILI_MASTER_KEY: wemall_meili_key
      MEILI_ENV: development
    volumes:
      - meilidata:/meili_data

  # ── Phase 1 Services ───────────────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
    ports: ['9001:9001']
    env_file: .env
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-users:5432/wemall_users?sslmode=disable
      GRPC_PORT: '9001'
      REDIS_URL: redis:6379
    depends_on:
      postgres-users:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: ./services/product-service/Dockerfile
    ports: ['9003:9003']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-products:5432/wemall_products?sslmode=disable
      GRPC_PORT: '9003'
      SELLER_SERVICE_ADDR: seller-service:9002
    depends_on:
      postgres-products:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    ports: ['9005:9005']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-orders:5432/wemall_orders?sslmode=disable
      GRPC_PORT: '9005'
      NATS_URL: nats://nats:4222
      PRODUCT_SERVICE_ADDR: product-service:9003
      SELLER_SERVICE_ADDR: seller-service:9002
    depends_on:
      postgres-orders:
        condition: service_healthy
      nats:
        condition: service_started
      seller-service:
        condition: service_started
    restart: unless-stopped


  seller-service:
    build:
      context: .
      dockerfile: ./services/seller-service/Dockerfile
    ports: ['9002:9002']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-sellers:5432/wemall_sellers?sslmode=disable
      GRPC_PORT: '9002'
      ENVIRONMENT: development
    depends_on:
      postgres-sellers:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports: ['8080:8080']
    env_file: .env
    environment:
      PORT: '8080'
      USER_SERVICE_ADDR: user-service:9001
      PRODUCT_SERVICE_ADDR: product-service:9003
      ORDER_SERVICE_ADDR: order-service:9005
      SELLER_SERVICE_ADDR: seller-service:9002
      INVENTORY_SERVICE_ADDR: product-service:9003
      REDIS_URL: redis:6379
      ENVIRONMENT: development
      NOTIFICATION_SERVICE_ADDR: notification-service:9007
      REVIEW_SERVICE_ADDR: review-service:9009
      PAYMENT_SERVICE_ADDR: payment-service:9011
      CHAT_SERVICE_ADDR: chat-service:9012
      DISPUTE_SERVICE_ADDR: dispute-service:9013
      ADMIN_SERVICE_ADDR: admin-service:9014
      PROMOTION_SERVICE_ADDR: promotion-service:9015
      RECOMMENDATION_SERVICE_ADDR: recommendation-service:9016
    depends_on:
      - user-service
      - product-service
      - order-service
      - seller-service
      - notification-service
      - review-service
      - payment-service
      - chat-service
      - dispute-service
      - admin-service
      - promotion-service
      - recommendation-service
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    ports: ['9007:9007']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-notifications:5432/wemall_notifications?sslmode=disable
      GRPC_PORT: '9007'
      REDIS_URL: redis:6379
      NATS_URL: nats://nats:4222
      SELLER_SERVICE_ADDR: seller-service:9002
      ENVIRONMENT: development
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped


  review-service:
    build:
      context: .
      dockerfile: ./services/review-service/Dockerfile
    ports: ['9009:9009']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-reviews:5432/wemall_reviews?sslmode=disable
      GRPC_PORT: '9009'
      NATS_URL: nats://nats:4222
      ORDER_SERVICE_ADDR: order-service:9005
      ENVIRONMENT: development
    depends_on:
      postgres-reviews:
        condition: service_healthy
      nats:
        condition: service_started
      order-service:
        condition: service_started
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    ports: ['9011:9011']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-payments:5432/wemall_payments?sslmode=disable
      GRPC_PORT: '9011'
      NATS_URL: nats://nats:4222
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      GOOGLE_PAY_MERCHANT_ID: ${GOOGLE_PAY_MERCHANT_ID:-merchant_id_wemall}
      ENVIRONMENT: development
    depends_on:
      postgres-payments:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  documentation-service:
    build:
      context: .
      dockerfile: ./services/documentation-service/Dockerfile
    ports:
      - '8085:8085'
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: ./services/chat-service/Dockerfile
    ports: ['9012:9012']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-chat:5432/wemall_chat?sslmode=disable
      GRPC_PORT: '9012'
      NATS_URL: nats://nats:4222
      ENVIRONMENT: development
    depends_on:
      postgres-chat:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  dispute-service:
    build:
      context: .
      dockerfile: ./services/dispute-service/Dockerfile
    ports: ['9013:9013']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-dispute:5432/wemall_dispute?sslmode=disable
      GRPC_PORT: '9013'
      NATS_URL: nats://nats:4222
      ENVIRONMENT: development
    depends_on:
      postgres-dispute:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: ./services/admin-service/Dockerfile
    ports: ['9014:9014']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-admin:5432/wemall_admin?sslmode=disable
      USERS_DB_URL: postgres://wemall:wemall_secret@postgres-users:5432/wemall_users?sslmode=disable
      SELLERS_DB_URL: postgres://wemall:wemall_secret@postgres-sellers:5432/wemall_sellers?sslmode=disable
      DISPUTES_DB_URL: postgres://wemall:wemall_secret@postgres-dispute:5432/wemall_dispute?sslmode=disable
      ORDERS_DB_URL: postgres://wemall:wemall_secret@postgres-orders:5432/wemall_orders?sslmode=disable
      SELLER_SERVICE_ADDR: seller-service:9002
      GRPC_PORT: '9014'
      NATS_URL: nats://nats:4222
      ENVIRONMENT: development
    depends_on:
      postgres-admin:
        condition: service_healthy
      nats:
        condition: service_started
      seller-service:
        condition: service_started
    restart: unless-stopped

  promotion-service:
    build:
      context: .
      dockerfile: ./services/promotion-service/Dockerfile
    ports: ['9015:9015']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-promotion:5432/wemall_promotion?sslmode=disable
      GRPC_PORT: '9015'
      NATS_URL: nats://nats:4222
      ENVIRONMENT: development
    depends_on:
      postgres-promotion:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  recommendation-service:
    build:
      context: .
      dockerfile: ./services/recommendation-service/Dockerfile
    ports: ['9016:9016']
    environment:
      DB_URL: postgres://wemall:wemall_secret@postgres-recommendation:5432/wemall_recommendation?sslmode=disable
      GRPC_PORT: '9016'
      NATS_URL: nats://nats:4222
      ENVIRONMENT: development
    depends_on:
      postgres-recommendation:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata-users:
  pgdata-products:
  pgdata-orders:
  pgdata-sellers:
  pgdata-notifications:
  pgdata-reviews:
  pgdata-payments:
  pgdata-chat:
  pgdata-dispute:
  pgdata-admin:
  pgdata-promotion:
  pgdata-recommendation:
  redisdata:
  natsdata:
  meilidata:
