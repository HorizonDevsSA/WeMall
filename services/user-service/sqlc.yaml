version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema:  "db/migrations/"
    gen:
      go:
        package: "db"
        out:     "internal/db"
        emit_json_tags:               true
        emit_pointers_for_null_types: true
        emit_sql_as_comment:           true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type:   "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type:   "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type:   "Time"
              pointer: true
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamp"
            nullable: true
            go_type:
              import: "time"
              type:   "Time"
              pointer: true
          - db_type: "user_role"
            go_type: "string"
          - db_type: "auth_provider"
            go_type: "string"
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "varchar"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "character varying"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "boolean"
            nullable: true
            go_type:
              type: "bool"
              pointer: true
