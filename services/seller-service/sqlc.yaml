version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema:  "db/migrations/"
    gen:
      go:
        package: "db"
        out:     "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags:                true
        emit_pointers_for_null_types:  true
        emit_sql_as_comment:           true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type:   "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "numeric"
            go_type: "float64"
          - column: "sellers.latitude"
            go_type: 
              pointer: true
              type: "float64"
          - column: "sellers.longitude"
            go_type: 
              pointer: true
              type: "float64"
          - column: "UpdateSellerParams.store_name"
            go_type:
              pointer: true
              type: "string"
          - column: "UpdateSellerParams.store_slug"
            go_type:
              pointer: true
              type: "string"
