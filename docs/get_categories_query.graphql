query GetCategories($language: String) {
  categories(language: $language) {
    id
    name
    slug
    level
    iconUrl
    bannerUrl
    sortOrder
    attributeSchema
    children {
      id
      name
      slug
      level
      iconUrl
      bannerUrl
      sortOrder
      attributeSchema
      children {
        id
        name
        slug
        level
        iconUrl
        bannerUrl
        sortOrder
        attributeSchema
      }
    }
  }
}
